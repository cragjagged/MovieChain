<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="#13161c"/>
  <!-- Chain link body (horizontal oval) in accent blue -->
  <rect x="6" y="13" width="36" height="22" rx="10" fill="#00b4d8"/>
  <!-- Through-hole giving the chain-link its ring shape -->
  <rect x="15" y="19" width="18" height="10" rx="5" fill="#0d101a"/>
  <!-- Film sprocket perforations — top bar -->
  <rect x="16" y="14.5" width="4" height="3" rx="0.7" fill="#0d101a"/>
  <rect x="22" y="14.5" width="4" height="3" rx="0.7" fill="#0d101a"/>
  <rect x="28" y="14.5" width="4" height="3" rx="0.7" fill="#0d101a"/>
  <!-- Film sprocket perforations — bottom bar -->
  <rect x="16" y="30.5" width="4" height="3" rx="0.7" fill="#0d101a"/>
  <rect x="22" y="30.5" width="4" height="3" rx="0.7" fill="#0d101a"/>
  <rect x="28" y="30.5" width="4" height="3" rx="0.7" fill="#0d101a"/>
</svg>
